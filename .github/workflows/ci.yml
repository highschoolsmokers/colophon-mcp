name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}
  MCP_IMAGE: ghcr.io/${{ github.repository }}-mcp

jobs:
  # ------------------------------------------------------------------
  # 1. Lint, type-check, and run unit tests
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests (cache, dedup, API clients)
        run: npx vitest run src/core/__tests__/cache.test.ts src/core/__tests__/dedup.test.ts src/core/__tests__/api.test.ts

  # ------------------------------------------------------------------
  # 2. Build Docker images
  # ------------------------------------------------------------------
  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build web image
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build MCP image
      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.mcp
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.MCP_IMAGE }}:latest
            ${{ env.MCP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------------
  # 3. Test Docker images (integration + search regression tests)
  # ------------------------------------------------------------------
  test-docker:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Test MCP image
      - name: Test MCP server responds to initialize
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"test","version":"1.0"}}}' \
          | docker run --rm -i ${{ env.MCP_IMAGE }}:${{ github.sha }} 2>/dev/null \
          | grep -q '"serverInfo"'

      # Test web image
      - name: Start web container
        run: |
          docker run -d -p 3333:3333 --name colophon-test ${{ env.WEB_IMAGE }}:${{ github.sha }}
          sleep 3

      - name: Health check
        run: curl -sf http://localhost:3333/api/health | grep -q '"ok"'

      - name: Run integration tests against Docker
        run: npx vitest run src/core/__tests__/web.test.ts src/core/__tests__/search-regression.test.ts
        timeout-minutes: 5

      - name: Stop container
        if: always()
        run: docker stop colophon-test && docker rm colophon-test
